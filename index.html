<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAA Score Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F0E0C;--ink2:#4A4840;--ink3:#9A9890;
  --page:#F4F6FB;--paper:#FFFFFF;
  --rule:rgba(0,0,0,0.08);--rule-md:rgba(0,0,0,0.15);
  --wab:#3B3FAF;--wab-dk:#2A2D8A;--wab-bg:#ECEDFB;
  --teal:#2BBFA4;--teal-dk:#1A9B83;--teal-bg:#E0F7F3;
  --gold:#C4952A;--gold-bg:#FBF3E0;
  --silver:#7A8FA6;--silver-bg:#EEF3F8;
  --bronze:#A0683A;--bronze-bg:#F7EDE4;
  --red:#B02828;--red-bg:#FCEAEA;
  --green:#2E6B12;--green-bg:#EAF5E1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--page);color:var(--ink);min-height:100vh;}

/* ── Login screen ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#2A2D8A 0%,#3B3FAF 50%,#1A9B83 100%);}
.login-card{background:var(--paper);border-radius:20px;padding:36px 32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.login-logo{height:40px;object-fit:contain;margin-bottom:24px;display:block;}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--ink2);margin-bottom:28px;line-height:1.6;}
.login-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--rule-md);border-radius:10px;background:var(--page);color:var(--ink);font-size:14px;font-family:'Space Mono',monospace;letter-spacing:.05em;margin-bottom:8px;transition:border-color .15s;}
.login-input:focus{outline:none;border-color:var(--wab);background:#fff;}
.login-input.err{border-color:var(--red);background:var(--red-bg);}
.login-hint{font-size:11px;color:var(--ink3);margin-bottom:20px;}
.login-hint span{color:var(--wab);font-family:'Space Mono',monospace;}
.btn-login{width:100%;padding:12px;background:linear-gradient(90deg,var(--wab),var(--teal-dk));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:opacity .15s;}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.login-err{background:var(--red-bg);border:0.5px solid #EFA5A5;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red);margin-top:12px;display:none;}

/* ── Main dashboard ── */
.dash{display:none;}
.hero{background:linear-gradient(135deg,#2A2D8A 0%,#3B3FAF 60%,#1A9B83 100%);color:#fff;padding:28px 24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(43,191,164,0.15);}
.hero-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.hero-logo{height:30px;object-fit:contain;filter:brightness(0) invert(1);opacity:.9;}
.hero-div{width:1px;height:24px;background:rgba(255,255,255,0.3);}
.hero-eye{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.hero-title{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px;}
.hero-title span{color:var(--teal);}
.hero-batch{font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:14px;}

/* ── My rank card ── */
.myrank-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.myrank-left{text-align:center;min-width:56px;}
.myrank-num{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;line-height:1;color:#fff;}
.myrank-lbl{font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.myrank-div{width:1px;height:48px;background:rgba(255,255,255,0.2);}
.myrank-right{flex:1;}
.myrank-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:3px;}
.myrank-batch{font-size:11px;color:rgba(255,255,255,0.5);}
.myrank-score{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--teal);margin-top:4px;}
.myrank-no-data{font-size:12px;color:rgba(255,255,255,0.6);padding:4px 0;}

/* ── Selector bar ── */
.selbar{background:var(--paper);border-bottom:0.5px solid var(--rule-md);padding:10px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(59,63,175,0.06);flex-wrap:wrap;}
.sel-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);flex-shrink:0;}
.prog-tabs{display:flex;gap:4px;}
.ptab{padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--rule-md);border-radius:20px;background:transparent;color:var(--ink2);font-family:inherit;transition:all .12s;}
.ptab:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.ptab.a-aus{background:var(--wab-bg);border-color:var(--wab);color:var(--wab);}
.ptab.a-tok{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-dk);}
.logout-btn{margin-left:auto;padding:5px 12px;font-size:11px;cursor:pointer;border:0.5px solid var(--rule-md);border-radius:20px;background:transparent;color:var(--ink3);font-family:inherit;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}

/* ── Content ── */
.content{padding:18px 24px;max-width:960px;}

/* ── Exam tabs ── */
.exam-tabs-wrap{overflow-x:auto;margin-bottom:14px;}
.exam-tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--rule-md);min-width:max-content;}
.etab{padding:7px 13px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ink2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;border-radius:4px 4px 0 0;}
.etab:hover{color:var(--ink);background:var(--page);}
.etab.on{font-weight:600;border-bottom-color:currentColor;}
.etab.on.aus{color:var(--wab);}
.etab.on.tok{color:var(--teal);}

/* ── Podium ── */
.podium-row{display:flex;gap:8px;margin-bottom:16px;}
.pcard{flex:1;background:var(--paper);border:0.5px solid var(--rule-md);border-radius:12px;padding:14px;overflow:hidden;position:relative;}
.pcard.r1{border-color:var(--gold);background:var(--gold-bg);}
.pcard.r2{border-color:var(--silver);}
.pcard.r3{border-color:var(--bronze);}
.pcard.is-me{box-shadow:0 0 0 2.5px var(--wab);}
.pcard.r1.is-me{box-shadow:0 0 0 2.5px var(--wab),0 0 0 5px var(--wab-bg);}
.me-badge{position:absolute;top:10px;right:10px;background:var(--wab);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.04em;}
.p-medal{font-size:24px;line-height:1;margin-bottom:6px;}
.p-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.p-batch{font-size:9px;color:var(--ink3);margin-bottom:8px;}
.p-score{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.p-lbl{font-size:9px;color:var(--ink3);margin-top:1px;}

/* ── My position (not top 3) ── */
.mypos-card{background:var(--wab-bg);border:1.5px solid var(--wab);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.mypos-rank{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--wab);min-width:48px;text-align:center;}
.mypos-info{flex:1;}
.mypos-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.mypos-score{font-family:'Space Mono',monospace;font-size:16px;color:var(--wab);font-weight:700;}
.mypos-tag{font-size:10px;color:var(--wab);background:var(--paper);border:0.5px solid var(--wab);border-radius:20px;padding:2px 8px;margin-left:8px;font-weight:600;}

/* ── Sec head ── */
.sec-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);}
.sec-sub{font-size:11px;color:var(--ink3);}

/* ── Full table (collapsible) ── */
.show-all-btn{width:100%;padding:9px;background:transparent;border:0.5px solid var(--rule-md);border-radius:10px;font-size:12px;color:var(--ink2);cursor:pointer;font-family:inherit;margin-top:8px;}
.show-all-btn:hover{background:var(--page);}
.lb-wrap{background:var(--paper);border:0.5px solid var(--rule-md);border-radius:12px;overflow:hidden;margin-top:8px;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:0.5px solid var(--rule-md);}
.lb-table td{padding:9px 12px;border-bottom:0.5px solid var(--rule);font-size:12px;vertical-align:middle;}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tr.me td{background:var(--wab-bg);font-weight:500;}
.lb-table tr.gold-row td{background:var(--gold-bg);}
.rnk{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--ink3);width:28px;}
.rnk.g{color:var(--gold);}.rnk.s{color:var(--silver);}.rnk.b{color:var(--bronze);}.rnk.m{color:var(--wab);}
.nm{font-weight:500;}
.sc{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-align:right;}
.mbar{width:60px;height:4px;background:var(--page);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;}
.mfill{height:100%;border-radius:2px;transition:width .4s;}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{font-size:10px;padding:1px 6px;border-radius:20px;font-family:'Space Mono',monospace;}
.chip.aus{background:var(--wab-bg);color:var(--wab);}
.chip.tok{background:var(--teal-bg);color:var(--teal-dk);}
.chip.hadir{background:var(--green-bg);color:var(--green);}
.empty-row td{text-align:center;padding:24px;color:var(--ink3);font-size:12px;font-style:italic;}

/* ── Blur nama (privasi) untuk student selain top 3 / bukan diri sendiri ── */
.nm-blur{filter:blur(4px);user-select:none;}
.hadir-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--ink2);background:var(--page);border-radius:20px;padding:2px 7px;font-family:'Space Mono',monospace;}
.hadir-pill svg{width:9px;height:9px;flex-shrink:0;}
.p-hadir{font-size:9px;color:var(--green);margin-top:3px;font-family:'Space Mono',monospace;}
.mypos-hadir{font-size:11px;color:var(--green);margin-top:2px;font-family:'Space Mono',monospace;}
.myrank-hadir{font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px;font-family:'Space Mono',monospace;}

/* ── Loading ── */
.ld{padding:40px;text-align:center;}
.dots{display:inline-flex;gap:5px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:bounce .8s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--rule-md);border-radius:3px;}
</style>
</head>

const DATA_KEY='waa_lb_data';

const CACHE_TTL=30*60*1000; // 30 menit cache di browser

const EXAM_DEFS={
  aus:[{key:'overall',label:'Overall'},{key:'mid_a1',label:'Mid A1'},{key:'final_a1',label:'Final A1'},{key:'mid_a2',label:'Mid A2'},{key:'final_a2',label:'Final A2'},{key:'mid_b1',label:'Mid B1'},{key:'final_b1',label:'Final B1'}],
  tok:[{key:'overall',label:'Overall'},{key:'mid_n5',label:'Mid N5'},{key:'final_n5',label:'Final N5'},{key:'mid_n4',label:'Mid N4'},{key:'final_n4',label:'Final N4'}]

const AVG_F={mid_a1:'avg_mid_a1',final_a1:'avg_final_a1',mid_a2:'avg_mid_a2',final_a2:'avg_final_a2',mid_b1:'avg_mid_b1',final_b1:'avg_final_b1',mid_n4:'avg_mid_n4',final_n4:'avg_final_n4',mid_n5:'avg_mid_n5',final_n5:'avg_final_n5'};
const SKOR_F={aus:{mid_a1:'skor_mid_a1',final_a1:'skor_final_a1',mid_a2:'skor_mid_a2',final_a2:'skor_final_a2',mid_b1:'skor_mid_b1',final_b1:'skor_final_b1'},tok:{mid_n5:'skor_mid_n5',final_n5:'skor_final_n5',mid_n4:'skor_mid_n4',final_n4:'skor_final_n4'}};

let allData=[],myStudent=null,prog='aus',exam='overall',showAll=false;

function detectProg(b){
  const s=(b||'').toLowerCase();
  if(s.includes('tokutei')||s.includes('jepang')) return 'tok';
  if(s.includes('ausbildung')||s.includes('jerman')) return 'aus';
  return null;
}

// Extract searching ID dari format "NAMA - ID"
function extractId(raw){
  const s=raw.trim().toUpperCase();
  if(s.includes(' - ')){return s.split(' - ').pop().trim();}
  return s;
}

// Parser CSV sederhana yang aware terhadap quoted field (field bisa berisi koma/newline di dalam tanda kutip)
function parseCSV(text){
  const rows=[];
  let row=[],field='',inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i++;}
        else{inQuotes=false;}
      }else{field+=c;}
    }else{
      if(c==='"'){inQuotes=true;}
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/* skip, ditangani oleh \n */}
      else{field+=c;}
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  if(!rows.length) return [];
  const headers=rows[0];
  return rows.slice(1).filter(r=>r.length>1||r[0]).map(r=>{
    const obj={};
    headers.forEach((h,i)=>{obj[h]=r[i]!==undefined?r[i]:'';});
    return obj;
  });
}

// Bangun lookup kehadiran: key = kode searching_id compact (mis. AUSELKAMELIEN107) -> pct_kehadiran
// Sumber CSV Student Journey pakai format "NAMA - KODE", leaderboard pakai KODE compact saja
async function fetchAttendanceLookup(){
  const lookup={};
  try{
    const resp=await fetch(SJ_CSV_URL+'&_cb='+Date.now(),{cache:'no-store'});
    console.log('[debug-kehadiran] fetch status:',resp.status,resp.ok);
    if(!resp.ok) return lookup;
    const text=await resp.text();
    console.log('[debug-kehadiran] CSV length:',text.length,'| preview:',text.slice(0,200));
    const rows=parseCSV(text);
    console.log('[debug-kehadiran] rows parsed:',rows.length,'| sample row:',rows[0]);
    let matched=0;
    rows.forEach(r=>{
      const sid=(r.searching_id||'').trim().toUpperCase();
      if(!sid) return;
      const code=sid.includes(' - ')?sid.split(' - ').pop().trim():sid;
      const pct=parseFloat(r.pct_kehadiran);
      if(code && !isNaN(pct)){lookup[code]=pct;matched++;}
    });
    console.log('[debug-kehadiran] total entries in lookup:',matched,'| sample keys:',Object.keys(lookup).slice(0,5));
  }catch(e){
    console.warn('[debug-kehadiran] Gagal memuat data kehadiran:',e.message,e);
  }
  return lookup;
}

window.onload=function(){
  const savedId=localStorage.getItem(ID_KEY);
  if(savedId){document.getElementById('loginInput').value=savedId; doLogin(true);}
};

function clearErr(){
  document.getElementById('loginInput').classList.remove('err');
  document.getElementById('loginErr').style.display='none';
}

function showLoginErr(msg){
  document.getElementById('loginErr').textContent=msg;
  document.getElementById('loginErr').style.display='block';
  document.getElementById('loginInput').classList.add('err');
}

async function doLogin(auto){
  const raw=document.getElementById('loginInput').value.trim();
  if(!raw){showLoginErr('Masukkan Searching ID kamu terlebih dahulu.');return;}
  const inputId=extractId(raw);
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='Mencari...';
  try{
    const data=await getDataCached();
    // Cari student by ID (field 'id' di data adalah searching_id, bukan Airtable record id)
    // Cari di field name yang formatnya "NAMA - ID" atau cari exact match di searching_id
    const found=data.find(r=>{
      const sid=(r.searching_id||'').trim().toUpperCase();
      return sid === inputId;
    });
    if(!found){showLoginErr('Student WAA ID tidak ditemukan. Pastikan ID sudah benar (contoh: TOKSEKAR123).');document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Lihat Ranking Saya';return;}
    localStorage.setItem(ID_KEY,inputId);
    myStudent=found;
    allData=data;
    // Detect program
    const dp=detectProg(found.batch);
    prog=dp||'aus';
    exam='overall';
    showAll=false;
    showDash();
  }catch(e){
    showLoginErr('Gagal memuat data: '+e.message);
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='Lihat Ranking Saya';
  }
}

async function getDataCached(){
  const ts=parseInt(localStorage.getItem(DATA_TS_KEY)||'0');
  const now=Date.now();
  if(now-ts<CACHE_TTL){
    const cached=localStorage.getItem(DATA_KEY);
    if(cached){try{return JSON.parse(cached);}catch(e){}}
  }
  const [resp,attLookup]=await Promise.all([fetch(API_URL),fetchAttendanceLookup()]);
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const text=await resp.text();
  const json=JSON.parse(text);
  if(json.error) throw new Error(json.error);
  const arr=Array.isArray(json)?json:[];
  console.log('[debug-kehadiran] total leaderboard rows:',arr.length,'| sample searching_id dari leaderboard:',arr.slice(0,5).map(r=>r.searching_id));
  // Join kehadiran via searching_id (kode compact, sama persis dgn key leaderboard)
  let joined=0;
  arr.forEach(r=>{
    const sid=(r.searching_id||'').trim().toUpperCase();
    if(sid && attLookup[sid]!==undefined){r.avg_hadir=attLookup[sid];joined++;}
  });
  console.log('[debug-kehadiran] berhasil join:',joined,'dari',arr.length,'student');
  try{
    localStorage.setItem(DATA_KEY,JSON.stringify(arr));
    localStorage.setItem(DATA_TS_KEY,String(Date.now()));
  }catch(e){}
  return arr;
}

function n(v){const x=parseFloat(v);return isNaN(x)?0:x;}
function computeScore(r,ek,p){
  if(ek==='overall'){
    // Pakai avg fields (0-100), bukan skor fields (1-3)
    const avgKeys = p==='aus'
      ? ['avg_mid_a1','avg_final_a1','avg_mid_a2','avg_final_a2','avg_mid_b1','avg_final_b1']
      : ['avg_mid_n5','avg_final_n5','avg_mid_n4','avg_final_n4'];
    const vs=avgKeys.map(k=>n(r[k])).filter(v=>v>0);
    return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:0;
  }
  return n(r[AVG_F[ek]]||0);
}
function getSubScores(r,p){
  return EXAM_DEFS[p].filter(e=>e.key!=='overall').map(e=>({label:e.label,val:computeScore(r,e.key,p)})).filter(s=>s.val>0);
}
function isMe(r){
  if(!myStudent) return false;
  // Bandingkan berdasarkan searching_id (format NAMA - ID)
  const mySid=(myStudent.searching_id||'').toUpperCase();
  const rSid=(r.searching_id||'').toUpperCase();
  if(mySid && rSid && mySid===rSid) return true;
  // Fallback: nama + batch
  return r.name===myStudent.name && r.batch===myStudent.batch;
}

  const medals=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];

    '</div></div>';

  let podium='';
  if(top3.length){

      top3.map((r,i)=>{
        const me=isMe(r);
        const hadir=n(r.avg_hadir);
        return '<div class="pcard r'+(i+1)+(me?' is-me':'')+'">'+
          (me?'<div class="me-badge">KAMU</div>':'')+
          '<div class="p-medal">'+medals[i]+'</div>'+
          '<div class="p-name">'+(r.name||'&#x2014;')+'</div>'+
          '<div class="p-score">'+r._score.toFixed(1)+'</div>'+
          '<div class="p-lbl">'+examLbl+'</div>'+
          (hadir>0?'<div class="p-hadir">Hadir: '+hadir.toFixed(0)+'%</div>':'')+
          '</div>';
      }).join('')+
      (top3.length<3?Array(3-top3.length).fill('<div class="pcard" style="opacity:.2"><div class="p-medal">&#x2014;</div></div>').join(''):'')+
      '</div>';
  }

  // My position card (kalau tidak masuk top 3)
  let myPosHTML='';
  if(myRanked && myRank>3){
    const myHadir=n(myRanked.avg_hadir);
    myPosHTML='<div class="mypos-card">'+
      '<div class="mypos-rank">#'+myRank+'</div>'+
      '<div class="mypos-info">'+
        '<div class="mypos-name">'+(myRanked.name||'&#x2014;')+'<span class="mypos-tag">KAMU</span></div>'+
        '<div class="mypos-score">'+myScore.toFixed(1)+'</div>'+
        (myHadir>0?'<div class="mypos-hadir">Kehadiran: '+myHadir.toFixed(0)+'%</div>':'')+
      '</div>'+
      '</div>';
  }

  // Full table (collapsible)
  const colspan=exam==='overall'?6:5;
  const rowsData=showAll?scored:[];
  const tableRows=rowsData.length?rowsData.map(r=>{
    const pct=maxSc>0?(r._score/maxSc*100).toFixed(1):0;
    const me=isMe(r);
    const rc=r._rank===1?'g':r._rank===2?'s':r._rank===3?'b':(me?'m':'');
    const subs=exam==='overall'?getSubScores(r,prog):[];
    const showName=me||r._rank<=3;
    const hadir=n(r.avg_hadir);
    const hadirHTML=hadir>0?'<span class="hadir-pill">'+hadir.toFixed(0)+'%</span>':'<span style="color:var(--ink3);font-size:10px">&#x2014;</span>';
    return '<tr class="'+(r._rank<=3?'gold-row':'')+(me?' me':'')+'">'+
      '<td class="rnk '+rc+'">'+(me?'<b>'+r._rank+'</b>':r._rank)+'</td>'+
      '<td class="nm'+(showName?'':' nm-blur')+'">'+(r.name||'&#x2014;')+(me?' <span style="font-size:10px;color:var(--wab);font-weight:700">&bull; kamu</span>':'')+'</td>'+
      '<td class="sc" style="color:'+fill+'">'+r._score.toFixed(1)+'</td>'+
      '<td><div class="mbar"><div class="mfill" style="width:'+pct+'%;background:'+fill+'"></div></div></td>'+
      '<td>'+hadirHTML+'</td>'+
      (exam==='overall'?'<td><div class="chips">'+subs.map(s=>'<span class="chip '+(isTok?'tok':'aus')+'">'+s.label+': '+s.val.toFixed(0)+'</span>').join('')+(!subs.length?'<span style="color:var(--ink3);font-size:10px">Belum ada nilai</span>':'')+'</div></td>':'')+
      '</tr>';
  }).join(''):'';

  const tableHTML='<div class="lb-wrap" '+(showAll?'':'style="display:none"')+'><table class="lb-table">'+
    '<thead><tr><th>#</th><th>Nama</th><th>Score</th><th>Bar</th><th>Kehadiran</th>'+(exam==='overall'?'<th>Detail</th>':'')+'</tr></thead>'+
    '<tbody>'+(tableRows||'<tr class="empty-row"><td colspan="'+colspan+'">Belum ada nilai untuk ujian ini.</td></tr>')+'</tbody>'+
    '</table></div>';

  const totalInBatch=batchStudents.length;
  const showBtn='<button class="show-all-btn" onclick="toggleAll()">'+
    (showAll?'&#x25B2; Sembunyikan ranking lengkap':'&#x25BC; Lihat ranking lengkap ('+scored.length+' student dengan nilai dari '+totalInBatch+' di batch ini)')+
    '</button>';

  document.getElementById('main').innerHTML=tabs+podium+myPosHTML+'<div class="sec-head" style="margin-top:4px"><span class="sec-title">Ranking Lengkap</span><span class="sec-sub">'+scored.length+' student</span></div>'+showBtn+tableHTML;
}

function renderHeroRank(myRanked,myScore,myRank,total){
  const card=document.getElementById('myRankCard');
  if(!myRanked){
    card.innerHTML='<div class="myrank-no-data">Belum ada data nilai untuk ujian ini &mdash; pilih ujian lain atau tunggu hasil keluar.</div>';
    return;
  }
  const hadir=n(myRanked.avg_hadir);
  card.innerHTML=
    '<div class="myrank-left"><div class="myrank-num">#'+myRank+'</div><div class="myrank-lbl">dari '+total+'</div></div>'+
    '<div class="myrank-div"></div>'+
    '<div class="myrank-right">'+
      '<div class="myrank-name">'+(myRanked.name||'&#x2014;')+'</div>'+
      '<div class="myrank-batch">'+(myRanked.batch||'')+'</div>'+
      '<div class="myrank-score">'+myScore.toFixed(1)+' <span style="font-size:11px;opacity:.7">pts</span></div>'+
      (hadir>0?'<div class="myrank-hadir">Kehadiran: '+hadir.toFixed(0)+'%</div>':'')+
    '</div>';
}
</script>
</body>
</html>
